// ── Abrir modal ──────────────────────────────────────────────────────────────
function abrirLocalizacaoEntregador() {

}
function centrarMotoCliente() {
    if (_mapaCliente && _motoMarker) {
        const ll = _motoMarker.getLngLat();
        _mapaCliente.flyTo({ center: [ll.lng, ll.lat], zoom: 16, duration: 800 });

    } else if (_mapaCliente) {
        _mapaCliente.flyTo({ center: [FABRICA_OFFLINE[1], FABRICA_OFFLINE[0]], zoom: 16, duration: 800 });
    }
}

// ── Iniciar mapa ─────────────────────────────────────────────────────────────
function _iniciarMapa() {
    _mapaCliente = new maplibregl.Map({
        container: 'mapaEntregadorCliente',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [FABRICA_COORDS[1], FABRICA_COORDS[0]],
        zoom: 15, pitch: 0, bearing: 0,
        attributionControl: false
    });
    _mapaCliente.on('load', () => {
        // Marcador fábrica fixo
        const elFab = document.createElement('div');
        elFab.innerHTML = '<span style="font-size:34px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));">⛺</span>';
        new maplibregl.Marker({ element: elFab, anchor: 'bottom' })
            .setLngLat([FABRICA_COORDS[1], FABRICA_COORDS[0]])
            .setPopup(new maplibregl.Popup().setHTML('<b>⛺ O Rei da Coxinha</b><br>Ponto de partida'))
            .addTo(_mapaCliente);
        // Sources para linha vermelha do percurso normal (antes e durante a rota)
        _mapaCliente.addSource('rota-normal', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:[] } } });
        _mapaCliente.addLayer({ id:'rota-normal-layer', type:'line', source:'rota-normal',
            layout:{ 'line-join':'round', 'line-cap':'round' },
            paint:{ 'line-color':'#ff4757', 'line-width':3, 'line-opacity':0.6, 'line-dasharray':[8,5] }
        });
        // Seta SDF apontando para DIREITA (→) — MapLibre rotaciona seguindo a linha
        (function() {
          const sz = 32;
          const c = document.createElement('canvas'); c.width = sz; c.height = sz;
          const x = c.getContext('2d');
          x.clearRect(0, 0, sz, sz);
          x.fillStyle = '#ffffff';
          x.beginPath();
          x.moveTo(sz-4,  sz/2);
          x.lineTo(4,     6);
          x.lineTo(10,    sz/2);
          x.lineTo(4,     sz-6);
          x.closePath();
          x.fill();
          const id = x.getImageData(0, 0, sz, sz);
          if (!_mapaCliente.hasImage('seta-rota')) {
            _mapaCliente.addImage('seta-rota', { width:sz, height:sz, data:id.data }, { sdf: true });
          }
        })();
        _mapaCliente.addLayer({ id:'rota-normal-setas', type:'symbol', source:'rota-normal',
            layout:{
                'symbol-placement':'line', 'symbol-spacing':90,
                'icon-image':'seta-rota', 'icon-size':0.55,
                'icon-rotation-alignment':'map', 'icon-keep-upright':false,
                'icon-allow-overlap':true, 'icon-ignore-placement':true
            },
            paint:{ 'icon-color':'#ff4757', 'icon-opacity':0.95 }
        });
        // VOLTA: laranja
        _mapaCliente.addSource('rota-volta', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:[] } } });
        _mapaCliente.addLayer({ id:'rota-volta-layer', type:'line', source:'rota-volta',
            layout:{ 'line-join':'round', 'line-cap':'round' },
            paint:{ 'line-color':'#f5a623', 'line-width':3, 'line-opacity':0.6, 'line-dasharray':[8,5] }
        });
        _mapaCliente.addLayer({ id:'rota-volta-setas', type:'symbol', source:'rota-volta',
            layout:{
                'symbol-placement':'line', 'symbol-spacing':90,
                'icon-image':'seta-rota', 'icon-size':0.55,
                'icon-rotation-alignment':'map', 'icon-keep-upright':false,
                'icon-allow-overlap':true, 'icon-ignore-placement':true
            },
            paint:{ 'icon-color':'#f5a623', 'icon-opacity':0.95 }
        });
        // Source para linha azul (próxima parada — só quando rota iniciada)
        _mapaCliente.addSource('rota-proxima-normal', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:[] } } });
        _mapaCliente.addLayer({ id:'rota-proxima-normal-layer', type:'line', source:'rota-proxima-normal',
            layout:{ 'line-join':'round', 'line-cap':'round' },
            paint:{ 'line-color':'#3d9cff', 'line-width':5, 'line-opacity':0.9 }
        });
        // Sources para linhas da rota aleatória
        _iniciarSourcesRA();
        // ── Moto aparece SEMPRE — começa na fábrica e atualiza quando GPS chegar
        const lngLatFab = [FABRICA_OFFLINE[1], FABRICA_OFFLINE[0]];
        _motoMarker = new maplibregl.Marker({ element: _elMoto(_modo3D), anchor: 'center' })
            .setLngLat(lngLatFab)
            .setPopup(new maplibregl.Popup().setHTML('<b>🛵 Entregador</b><br>Offline'))
            .addTo(_mapaCliente);
        // Marcador do próprio cliente (sempre azul, sempre visível)

        _iniciarRastreamento();
        verificarStatusEntregadorCard();

// ── Marcador do próprio cliente (azul, fixo) ─────────────────────────────────
async function _criarMarcadorEu() {
    if (!_mapaCliente || !user?.phone) return;
    try {
        const { data } = await sb.from('clientes')
            .select('delivery_lat,delivery_lon,name')
            .eq('phone', user.phone).maybeSingle();
        if (!data?.delivery_lat || !data?.delivery_lon) return;
        const lngLat = [parseFloat(data.delivery_lon), parseFloat(data.delivery_lat)];
        if (_euMarker) _euMarker.remove();
        _euMarker = new maplibregl.Marker({ element: _elCliente(data.name || 'Você', _minhaPosicao), anchor: 'bottom' })
            .setLngLat(lngLat)
            .setPopup(new maplibregl.Popup().setHTML('<b>📍 ' + (data.name || 'Você') + '</b><br>Sua localização'))
            .addTo(_mapaCliente);
        _mapaCliente.flyTo({ center: lngLat, zoom: 15, duration: 800 });
    } catch(e) {}
}

// ── Ícones ───────────────────────────────────────────────────────────────────
// ── 3D e velocímetro ────────────────────────────────────────────────────────
function _calcBearing(lat1, lon1, lat2, lon2) {
    const r = d => d * Math.PI / 180;
    const dL = r(lon2 - lon1);
    const y  = Math.sin(dL) * Math.cos(r(lat2));
    const x  = Math.cos(r(lat1)) * Math.sin(r(lat2)) - Math.sin(r(lat1)) * Math.cos(r(lat2)) * Math.cos(dL);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
function _suavizarBearing(b) {
    _bearingHist.push(b);
    if (_bearingHist.length > 6) _bearingHist.shift();
    let s = 0, c = 0;
    _bearingHist.forEach(v => { s += Math.sin(v*Math.PI/180); c += Math.cos(v*Math.PI/180); });
    return (Math.atan2(s, c) * 180 / Math.PI + 360) % 360;
}
function toggle3DCliente() {
    _modo3D = !_modo3D;
    const btn = document.getElementById('btn3DCliente');
    if (_modo3D) {
        btn.style.background = 'rgba(61,156,255,0.2)';
        btn.style.borderColor = 'rgba(61,156,255,0.7)';
        btn.style.boxShadow   = '0 2px 20px rgba(61,156,255,0.3)';
        if (_ultimaPos && _mapaCliente) {
            _mapaCliente.easeTo({ center:[_ultimaPos[1],_ultimaPos[0]], pitch:72, zoom:18.5, duration:900 });
        }
    } else {
        btn.style.background = 'rgba(10,10,15,0.88)';
        btn.style.borderColor = 'rgba(61,156,255,0.4)';
        btn.style.boxShadow   = '0 2px 14px rgba(0,0,0,0.5)';
        if (_mapaCliente) _mapaCliente.easeTo({ pitch:0, bearing:0, zoom:16, duration:700 });
    }
    // Recriar marcador com tamanho correto para o modo
    if (_motoMarker && _ultimaPos) {
        const lngLat = [_ultimaPos[1], _ultimaPos[0]];
        _motoMarker.remove();
        _motoMarker = new maplibregl.Marker({ element: _elMoto(_modo3D), anchor: 'center' })
            .setLngLat(lngLat)
            .setPopup(new maplibregl.Popup().setHTML('<b>🛵 Entregador</b><br>Posição ao vivo'))
            .addTo(_mapaCliente);
    }
}
function _atualizarVelocimetro(kmh) {
    _velocidade = kmh;
    const valEl = document.getElementById('velCliVal');
    const barEl = document.getElementById('velCliBar');
    if (!valEl || !barEl) return;
    valEl.textContent = kmh;
    const maxKmh = 80;
    const pct    = Math.min(kmh / maxKmh, 1);
    const circ   = 213.6;
    barEl.style.strokeDashoffset = circ * (1 - pct);
    // Cor: verde → laranja → vermelho
    const cor = kmh < 20 ? '#00e87a' : kmh < 50 ? '#f5a623' : '#ff4757';
    barEl.style.stroke = cor;
    valEl.style.color  = cor;
}

// ── Elementos DOM para marcadores MapLibre ───────────────────────────────────
function _elMoto(grande) {
    const imgW = grande ? 62 : 32;
    const imgH = grande ? 90 : 46;
    const wrap = grande ? 72 : 38;
    const el = document.createElement('div');
    el.style.cssText = `position:relative;width:${wrap}px;height:${wrap}px;display:flex;align-items:center;justify-content:center;`;
    el.innerHTML = `

// ── Fuso horário São Paulo ─────────────────────────────────────────────────
const TZ_SP = 'America/Sao_Paulo';

function _partesSP(d) {
    const fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: TZ_SP,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
    return Object.fromEntries(fmt.formatToParts(d || new Date()).filter(x => x.type !== 'literal').map(x => [x.type, x.value]));
}

/** Retorna Date "espelhado" para São Paulo — getHours()/getMinutes() retornam valores BRT/BRST. */
function horasBRT(d) {
    const p = _partesSP(d);
    return new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`);
}

/**
 * Converte "YYYY-MM-DD" + hora BRT para ISO string UTC correta.
 * Usa Intl para calcular o offset real, respeitando horário de verão.
 */
function _spHoraParaUTC(dateStr, hora = 14, minuto = 0) {
    const horaStr = String(hora).padStart(2, '0');
    const minStr  = String(minuto).padStart(2, '0');
    const ref = new Date(`${dateStr}T12:00:00Z`);
    const p = _partesSP(ref);
    const spMs  = new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`).getTime();
    const offsetMs = ref.getTime() - spMs;
    const spDesejadoMs = new Date(`${dateStr}T${horaStr}:${minStr}:00`).getTime();
    return new Date(spDesejadoMs + offsetMs);
}

// ── Janela de pedido: 14:30 BRT de hoje/ontem até 14:30 BRT de amanhã/hoje ──
function _janelaPedido() {
    const agora = new Date();
    const p = _partesSP(agora);
    const hoje = `${p.year}-${p.month}-${p.day}`;
    const hoje1430utc = _spHoraParaUTC(hoje, 14, 30);

    let inicio, fim;
    if (agora >= hoje1430utc) {
        // já passou das 14:30 BRT hoje → janela: 14:30 hoje até 14:30 amanhã
        const amanhaDate = new Date(agora.getTime() + 86400000);
        const pa = _partesSP(amanhaDate);
        const amanha = `${pa.year}-${pa.month}-${pa.day}`;
        inicio = hoje1430utc;
        fim = _spHoraParaUTC(amanha, 14, 30);
    } else {
        // antes das 14:30 BRT hoje → janela: 14:30 ontem até 14:30 hoje
        const ontemDate = new Date(agora.getTime() - 86400000);
        const po = _partesSP(ontemDate);
        const ontem = `${po.year}-${po.month}-${po.day}`;
        inicio = _spHoraParaUTC(ontem, 14, 30);
        fim = hoje1430utc;
    }
    return { inicio: inicio.toISOString(), fim: fim.toISOString() };
}

// ── Buscar e desenhar paradas da rota ativa ──────────────────────────────────
async function _buscarParadasRota() {
    if (!_mapaCliente) return;
    try {
        const janela = _janelaPedido();

        // Buscar pedidos na janela para saber quem fez pedido
        const { data: pedidos } = await sb.from('pedidos')
            .select('customer_phone')
            .gte('created_at', janela.inicio)
            .lt('created_at', janela.fim);
        const phonesComPedido = new Set((pedidos || []).map(p => p.customer_phone).filter(Boolean));

        // Buscar todas as rotas relevantes — inclui concluido para ver status real das paradas
        const { data: rotas } = await sb.from('rotas')
            .select('paradas,status,paradas_template,fim_em,saida_em')
            .in('status', ['em_andamento', 'criada', 'concluido'])
            .order('hora_saida', { ascending: true });

        // Filtra só rotas do dia de hoje (evita mostrar rotas de dias anteriores)
        const hoje = (() => { const p = _partesSP(); return `${p.year}-${p.month}-${p.day}`; })();
        const rotasDoDia = (rotas || []).filter(r => {
            if (r.status === 'em_andamento' || r.status === 'criada') return true;
            if (r.fim_em && r.fim_em.slice(0,10) === hoje) return true;
            if (r.saida_em && r.saida_em.slice(0,10) === hoje) return true;
            return false;
        });

        // Limpar marcadores antigos
        _paradaMarkers.forEach(m => m.remove());
        _paradaMarkers = [];

        if (!rotasDoDia?.length) {
            document.getElementById('mapaSituacao').textContent = 'Aguardando rota';
            return;
        }

        // Rota em andamento para o contador
        const rotaAtiva = rotasDoDia.find(r => r.status === 'em_andamento');
        if (rotaAtiva?.paradas?.length) {
            const entregues = rotaAtiva.paradas.filter(p => p.status === 'entregue').length;
            document.getElementById('mapaSituacao').textContent =
                entregues + '/' + rotaAtiva.paradas.length + ' entregues';
        } else {
            const rotaConcluida = rotasDoDia.find(r => r.status === 'concluido');
            if (rotaConcluida?.paradas?.length) {
                document.getElementById('mapaSituacao').textContent =
                    rotaConcluida.paradas.length + '/' + rotaConcluida.paradas.length + ' entregues ✅';
            }
        }

        // Consolida todas as paradas — usa SEMPRE rota.paradas (com status real),
        // NUNCA paradas_template que não tem o status 'entregue' salvo
        const todasParadas = [];
        rotasDoDia.forEach(rota => {
            const paradas = rota.paradas || [];
            paradas.forEach(p => todasParadas.push({ ...p, _rotaStatus: rota.status }));
        });

        // Numera APENAS quem fez pedido e não foi entregue ainda, na ordem da rota
        let contadorGlobal = 0;
        todasParadas.forEach(p => {
            if (phonesComPedido.has(p.cliente_phone) && p.status !== 'entregue' && p.coords) {
                contadorGlobal++;
                p._posicaoGlobal = contadorGlobal;
            }
        });

        // Pega posição global do próprio usuário (antes de filtrar)
        const minhaParada = todasParadas.find(p => p.cliente_phone === user?.phone);
        _minhaPosicao = minhaParada?._posicaoGlobal || null;
        // Atualiza marcador do próprio usuário com a posição se já estiver no mapa
        if (_euMarker && user?.name !== undefined) {
            const lngLat = _euMarker.getLngLat();
            _euMarker.remove();
            _euMarker = new maplibregl.Marker({ element: _elCliente(user.name || 'Você', _minhaPosicao), anchor: 'bottom' })
                .setLngLat(lngLat)
                .addTo(_mapaCliente);
        }

        // Filtra paradas visíveis (exclui próprio usuário — ele tem marcador separado)
        const paradasVisiveis = todasParadas.filter(p => {
            if (!p.coords) return false;
            if (p.cliente_phone === user?.phone) return false;
            if (!phonesComPedido.has(p.cliente_phone)) return false;
            if (p.status === 'entregue') return false;
            return true;
        });

        // Agrupa paradas próximas (até 20 metros) em clusters
        const RAIO_GRUPO = 20; // metros
        function _distM(a, b) {
            const R = 6371000;
            const dLat = (b[0]-a[0]) * Math.PI/180;
            const dLon = (b[1]-a[1]) * Math.PI/180;
            const s = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
        }

        const usados = new Array(paradasVisiveis.length).fill(false);
        const grupos = [];
        paradasVisiveis.forEach((p, i) => {
            if (usados[i]) return;
            const grupo = [p];
            usados[i] = true;
            paradasVisiveis.forEach((q, j) => {
                if (usados[j]) return;
                if (_distM(p.coords, q.coords) <= RAIO_GRUPO) {
                    grupo.push(q);
                    usados[j] = true;
                }
            });
            grupos.push(grupo);
        });

        // Renderiza cada grupo como um único marcador com os 👤 lado a lado
        grupos.forEach(grupo => {
            const ref = grupo[0];
            const el = document.createElement('div');
            el.style.cssText = 'display:flex;flex-direction:row;align-items:flex-end;gap:3px;';
            grupo.forEach(p => {
                const isEu = p.cliente_phone === user?.phone;
                const wrap = document.createElement('div');
                wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;';

                const label = document.createElement('div');
                if (isEu && user?.name) {
                    // Próprio cliente: mostra o nome
                    label.style.cssText = 'background:#1976d2;color:white;font-size:10px;font-weight:800;padding:2px 7px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.4);max-width:90px;overflow:hidden;text-overflow:ellipsis;';
                    label.textContent = user.name.split(' ')[0];
                } else {
                    // Outros clientes: mostra posição global (1ª, 2ª, 3ª...)
                    label.style.cssText = 'background:#1976d2;color:white;font-size:10px;font-weight:800;padding:2px 6px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.4);';
                    label.textContent = (p._posicaoGlobal || '') + 'ª';
                }
                wrap.appendChild(label);

                const icone = document.createElement('span');
                icone.style.cssText = 'font-size:24px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));';
                icone.textContent = '👤';
                wrap.appendChild(icone);
                el.appendChild(wrap);
            });
            const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
                .setLngLat([ref.coords[1], ref.coords[0]])
                .addTo(_mapaCliente);
            _paradaMarkers.push(marker);
        });

        // ── Linha vermelha: uma rota por vez
        // Se tem rota em andamento → mostra ela; senão → mostra a próxima a sair
        const rotaEmAndamento = rotasDoDia?.find(r => r.status === 'em_andamento');
        const rotaParaLinha = rotaEmAndamento || rotasDoDia?.filter(r => r.status === 'criada')
            .sort((a, b) => {
                const toMin = h => { if (!h) return 9999; const [hh,mm] = h.split(':').map(Number); return hh*60+mm; };
                return toMin(a.hora_saida) - toMin(b.hora_saida);
            })[0];

        const paradasDaRota = rotaParaLinha
            ? (rotaParaLinha.paradas || rotaParaLinha.paradas_template || [])
                .filter(p => phonesComPedido.has(p.cliente_phone) && p.coords && p.status !== 'entregue')
            : [];

        if (paradasDaRota.length > 0 && _mapaCliente.getSource('rota-normal')) {
            // IDA: fábrica → todos os clientes (vermelho)
            const pontosIda = [FABRICA_COORDS, ...paradasDaRota.map(p => p.coords)];
            const fallbackIda = pontosIda.map(p => [p[1], p[0]]);
            _buscarOSRM(pontosIda).then(coords => {
                _setGeoJSON('rota-normal', coords || fallbackIda);
            });
            // VOLTA: último cliente → fábrica (laranja)
            const pontosVolta = [paradasDaRota[paradasDaRota.length-1].coords, FABRICA_COORDS];
            const fallbackVolta = pontosVolta.map(p => [p[1], p[0]]);
            _buscarOSRM(pontosVolta).then(coords => {
                _setGeoJSON('rota-volta', coords || fallbackVolta);
            });
        } else if (_mapaCliente.getSource('rota-normal')) {
            _setGeoJSON('rota-normal', null);
            _setGeoJSON('rota-volta', null);
        }

        // ── Linha azul: fábrica → primeira parada pendente (só quando rota em andamento)
        const primeiraParada = rotaEmAndamento
            ? (rotaEmAndamento.paradas || []).find(p => p.coords && p.status !== 'entregue')
            : null;
        if (primeiraParada && _mapaCliente.getSource('rota-proxima-normal')) {
            const coordsProx = await _buscarOSRM([FABRICA_COORDS, primeiraParada.coords]);
            const fallbackProx = [[FABRICA_COORDS[1], FABRICA_COORDS[0]], [primeiraParada.coords[1], primeiraParada.coords[0]]];
            const linhaProx = coordsProx || fallbackProx;
            _cacheLinhaStatus = linhaProx;
            _setGeoJSON('rota-proxima-normal', linhaProx);
        } else if (_mapaCliente.getSource('rota-proxima-normal')) {
            _setGeoJSON('rota-proxima-normal', null);
        }

    } catch(e) { console.warn('Erro paradas:', e); }
}

// ── GPS do entregador ────────────────────────────────────────────────────────
function _agendarOffline() {
    // Só marca offline se JÁ não tiver um timer rodando — evita pisca-pisca
    if (_offlineTimer) return;
    _offlineTimer = setTimeout(() => {
        _offlineTimer = null;
        // Confirma que realmente continua sem sinal antes de marcar offline
        if (Date.now() - _ultimaVezOnline >= 12000) {
            _setOfflineFabrica();
        }
    }, 12000); // 12s de debounce — só offline se realmente sumiu
}

async function _buscarPosEntregador() {
    if (_buscarPosEntregador._rodando) return;
    _buscarPosEntregador._rodando = true;
    try {
        const { data } = await sb.from('gps')
            .select('valor').eq('chave','entregador_gps').maybeSingle();
        if (!data?.valor || data.valor === '{}') { _agendarOffline(); return; }
        let pos; try { pos = JSON.parse(data.valor); } catch(e) { _agendarOffline(); return; }
        if (!pos?.lat || !pos?.lon) { _agendarOffline(); return; }
        const diffMin = pos.ts ? (Date.now() - new Date(pos.ts).getTime()) / 60000 : 999;
        if (diffMin <= 5) {
            // Posição válida — cancela qualquer timer de offline pendente
            if (_offlineTimer) { clearTimeout(_offlineTimer); _offlineTimer = null; }
            _ultimaVezOnline = Date.now();
            _setOnline(pos);
        } else {
            // +5min sem update: agenda offline com debounce
            _agendarOffline();
        }
    } catch(e) {}
    finally { _buscarPosEntregador._rodando = false; }
}

function _setOnline(pos) {
    const diffMin = pos.ts ? (Date.now() - new Date(pos.ts).getTime()) / 60000 : 0;
    const fraco   = diffMin >= 1; // laranja se passou de 1 min
    const cor     = fraco ? '#f39c12' : '#2ecc71';
    const corBg   = fraco ? 'rgba(243,156,18,0.1)'  : 'rgba(46,204,113,0.1)';
    const corBd   = fraco ? 'rgba(243,156,18,0.3)'  : 'rgba(46,204,113,0.3)';
    const emoji   = fraco ? '🟠' : '🟢';
    const label   = fraco ? 'Sinal fraco' : 'Ao vivo';
    // pill
    const dot  = document.getElementById('mapaStatusDot');
    const lbl  = document.getElementById('mapaStatusLabel');
    const pill = document.getElementById('mapaStatusPill');
    if (dot)  dot.style.background = cor;
    if (lbl)  { lbl.textContent = label; lbl.style.color = cor; }
    if (pill) { pill.style.background = corBg; pill.style.borderColor = corBd; }
    // card
    const cardDot = document.getElementById('entregadorOnlineDot');
    const txt     = document.getElementById('entregadorStatusText');
    if (cardDot) cardDot.style.background = cor;
    if (txt) txt.textContent = label + ' ' + emoji;
    // atualização
    const mins = Math.round(diffMin);
    const atualEl = document.getElementById('mapaUltimaAtualizacao');
    if (atualEl) atualEl.textContent = mins === 0 ? 'Agora mesmo' : mins + ' min atrás';
    // moto
    if (!_mapaCliente) return;
    const lngLat = [pos.lon, pos.lat];
    _ultimaPos = [pos.lat, pos.lon];

    // Calcular bearing e velocidade a partir de posições consecutivas
    let bearing = 0;
    if (_ultimaPosAnterior && pos.ts) {
        const dLat = Math.abs(pos.lat - _ultimaPosAnterior[0]);
        const dLon = Math.abs(pos.lon - _ultimaPosAnterior[1]);
        if (dLat + dLon > 0.00003) {
            const raw = _calcBearing(_ultimaPosAnterior[0], _ultimaPosAnterior[1], pos.lat, pos.lon);
            bearing   = _suavizarBearing(raw);
        } else {
            bearing = _bearingHist.length ? _bearingHist[_bearingHist.length-1] : 0;
        }
    }
    _ultimaPosAnterior = [pos.lat, pos.lon];

    // Velocidade — usa campo da posição se disponível
    const kmh = pos.velocidade != null ? Math.round(pos.velocidade) : 0;
    _atualizarVelocimetro(kmh);

    if (!_motoMarker) {
        _motoMarker = new maplibregl.Marker({ element: _elMoto(_modo3D), anchor: 'center' })
            .setLngLat(lngLat)
            .setPopup(new maplibregl.Popup().setHTML('<b>🛵 Entregador</b><br>Posição ao vivo'))
            .addTo(_mapaCliente);
    } else {
        _motoMarker.setLngLat(lngLat);
    }

    // Câmera: modo 3D segue bearing+pitch; modo normal só centra
    if (_modo3D) {
        _mapaCliente.easeTo({ center:lngLat, bearing:bearing, pitch:72, zoom:18.5, duration:800, essential:true });
    } else {
        _mapaCliente.easeTo({ center:lngLat, duration:600 });
    }
    // Atualiza linhas da rota aleatória com nova posição da moto
    if (_raEmRota) _desenharRotaAleatoria();

    // Verifica desvio de 60m da linha e recalcula se necessário
    _verificarDesvioStatus(pos.lat, pos.lon);
}

// ===== RECÁLCULO POR DESVIO (STATUS) =====
let _cacheLinhaStatus = null;  // coordenadas [[lng,lat],...] da linha atual
let _ultimoRecalcStatus = 0;

function _distPontoSegSt(px, py, ax, ay, bx, by) {
    const dx = bx-ax, dy = by-ay;
    if (dx===0 && dy===0) return Math.hypot(px-ax, py-ay);
    const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
    return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}
function _distPontoLinhaSt(lat, lon, linha) {
    if (!linha || linha.length < 2) return Infinity;
    let min = Infinity;
    for (let i = 0; i < linha.length-1; i++) {
        const d = _distPontoSegSt(lon, lat, linha[i][0], linha[i][1], linha[i+1][0], linha[i+1][1]);
        const m = d * 111000;
        if (m < min) min = m;
    }
    return min;
}

async function _verificarDesvioStatus(lat, lon) {
    const agora = Date.now();
    if (agora - _ultimoRecalcStatus < 10000) return; // máx 1x a cada 10s
    const dist = _distPontoLinhaSt(lat, lon, _cacheLinhaStatus);
    if (dist <= 60) return;
    _ultimoRecalcStatus = agora;

    // Busca a próxima parada pendente e recalcula a partir da posição atual
    try {
        const janela = _janelaPedido();
        const { data: pedidos } = await sb.from('pedidos').select('customer_phone')
            .gte('created_at', janela.inicio).lt('created_at', janela.fim);
        const phonesComPedido = new Set((pedidos||[]).map(p=>p.customer_phone).filter(Boolean));
        const { data: rotas } = await sb.from('rotas').select('paradas,paradas_template,status')
            .in('status', ['em_andamento','criada']);
        if (!rotas?.length) return;

        // Pega a próxima parada pendente em ordem
        let proximaParada = null;
        for (const rota of rotas) {
            const paradas = rota.paradas || rota.paradas_template || [];
            proximaParada = paradas.find(p => phonesComPedido.has(p.cliente_phone) && p.coords && p.status !== 'entregue');
            if (proximaParada) break;
        }
        if (!proximaParada) return;

        // Recalcula linha: posição atual → próxima parada
        const pontos = [[lat, lon], proximaParada.coords];
        const coords = await _buscarOSRM(pontos);
        const fallback = pontos.map(p => [p[1], p[0]]);
        const linha = coords || fallback;
        _cacheLinhaStatus = linha;
        if (_mapaCliente.getSource('rota-proxima-normal')) {
            _setGeoJSON('rota-proxima-normal', linha);
        }
    } catch(e) { console.warn('Recálculo desvio:', e); }
}

function _setOfflineFabrica() {
    _setOffline();
    if (!_mapaCliente) return;
    const lngLat = [FABRICA_OFFLINE[1], FABRICA_OFFLINE[0]];
    if (!_motoMarker) {
        _motoMarker = new maplibregl.Marker({ element: _elMoto(_modo3D), anchor: 'center' })
            .setLngLat(lngLat)
            .setPopup(new maplibregl.Popup().setHTML('<b>🛵 Entregador</b><br>Offline'))

    }
}

}

// ── Rota Aleatória — lógica do cliente ──────────────────────────────────────
async function _carregarRA() {
    try {
        const { data } = await sb.from('gps').select('valor').eq('chave', RA_CHAVE).maybeSingle();
        _raConfig = data ? JSON.parse(data.valor) : null;
    } catch(e) { _raConfig = null; }
}

function _raAtiva() {
    if (!_raConfig?.ativa) return false;
    const agora = new Date();
    const brt   = horasBRT(agora);
    const diasMap = ['dom','seg','ter','qua','qui','sex','sab'];
    const hoje    = diasMap[brt.getDay()];
    if (_raConfig.dias_operacao?.length && !_raConfig.dias_operacao.includes(hoje)) return false;
    const toMin = h => { const [hh, mm] = (h||'00:00').split(':').map(Number); return hh*60+mm; };
    const agoraMin = brt.getHours()*60 + brt.getMinutes();
    return agoraMin >= toMin(_raConfig.hora_inicio) && agoraMin < toMin(_raConfig.hora_fim);
}

function _limparMarcadoresRA() {
    _raMarkers.forEach(m => m.remove());
    _raMarkers = [];
}

function _elFilaRA(nome) {
    const el = document.createElement('div');
    el.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default;';
    el.innerHTML = `<div style="background:rgba(230,126,34,0.92);color:white;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.4);">${nome.split(' ')[0]}</div>
                    <div style="width:10px;height:10px;background:#e67e22;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(230,126,34,0.7);"></div>`;
    return el;
}

async function _desenharFilaRA() {
    _limparMarcadoresRA();
    if (!_mapaCliente || !_raConfig) return;

    const fila = (_raConfig.clientes_fila || []).filter(c => c.status === 'pendente' && c.coords);
    
    fila.forEach(c => {
        const el = _elFilaRA(c.nome || 'Cliente');
        const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat([c.coords[1], c.coords[0]])
            .setPopup(new maplibregl.Popup({ offset: 12 }).setHTML(
                `<b>🎲 ${c.nome}</b><br>Na fila · ${c.hora_pedido || ''}`
            ))
            .addTo(_mapaCliente);
        _raMarkers.push(marker);
    });
}

async function _desenharRotaAleatoria() {
    if (!_mapaCliente) return;
    await _carregarRA();
    if (!_raConfig) return;

    const emRota   = (_raConfig.clientes_fila || []).filter(c => c.status === 'em_rota' && c.coords);
    const pendente = (_raConfig.clientes_fila || []).filter(c => c.status === 'pendente' && c.coords);
    const entregador = _ultimaPos; // [lat, lon]

    _limparMarcadoresRA();

    // Se entregador está em rota aleatória — mostrar trajetória
    if (emRota.length > 0 && entregador) {
        _raEmRota = true;

        // Marcadores das paradas em rota (laranja mais forte)
        emRota.forEach((c, i) => {
            const el = document.createElement('div');
            el.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;';
            el.innerHTML = `<div style="background:rgba(231,76,60,0.92);color:white;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;white-space:nowrap;">${i+1}. ${c.nome.split(' ')[0]}</div>
                            <div style="width:11px;height:11px;background:#e74c3c;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(231,76,60,0.7);"></div>`;
            const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
                .setLngLat([c.coords[1], c.coords[0]])
                .setPopup(new maplibregl.Popup({ offset: 12 }).setHTML(`<b>📦 ${c.nome}</b><br>Parada ${i+1}`))
                .addTo(_mapaCliente);
            _raMarkers.push(marker);
        });

        // Linha vermelha: entregador → todas as paradas em ordem
        const coordsCompleta = [
            [entregador[1], entregador[0]],
            ...emRota.map(c => [c.coords[1], c.coords[0]])
        ];
        _setGeoJSON('ra-completa', coordsCompleta);

        // Linha azul: entregador → próxima parada (primeira em_rota)
        if (emRota[0]) {
            const coordsProxima = [
                [entregador[1], entregador[0]],
                [emRota[0].coords[1], emRota[0].coords[0]]
            ];
            _setGeoJSON('ra-proxima', coordsProxima);
        }
    } else {
        _raEmRota = false;
        _setGeoJSON('ra-completa', null);
        _setGeoJSON('ra-proxima', null);

        // Se a rota está ativa e acumulando, mostra fila pendente
        if (_raAtiva() && pendente.length > 0) {
            await _desenharFilaRA();
        }
    }
}

const OSRM_BASE_CLI = 'https://router.project-osrm.org/route/v1/driving/';
async function _buscarOSRM(pontos) {
    if (!pontos || pontos.length < 2) return null;
    try {
        const url = OSRM_BASE_CLI + pontos.map(p => `${p[1]},${p[0]}`).join(';') + '?overview=full&geometries=geojson&steps=false';
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 8000);
        let r;
        try { r = await fetch(url, { signal: controller.signal }); } finally { clearTimeout(tid); }
        if (!r.ok) return null;
        const j = await r.json();
        return j.code === 'Ok' && j.routes?.length ? j.routes[0].geometry.coordinates : null;
    } catch(e) { return null; }
}

function _setGeoJSON(id, coords) {
    if (!_mapaCliente || !_mapaCliente.isStyleLoaded()) return;
    const src = _mapaCliente.getSource(id);
    const geojson = coords
        ? { type:'Feature', geometry:{ type:'LineString', coordinates: coords } }
        : { type:'Feature', geometry:{ type:'LineString', coordinates:[] } };
    if (src) { src.setData(geojson); }
}

function _iniciarSourcesRA() {
    if (!_mapaCliente.getSource('ra-completa')) {
        _mapaCliente.addSource('ra-completa', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:[] } } });
        _mapaCliente.addLayer({ id:'ra-completa-layer', type:'line', source:'ra-completa',
            layout:{ 'line-join':'round', 'line-cap':'round' },
            paint:{ 'line-color':'#e74c3c', 'line-width':3, 'line-opacity':0.85, 'line-dasharray':[2,1] }
        });
    }
    if (!_mapaCliente.getSource('ra-proxima')) {
        _mapaCliente.addSource('ra-proxima', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:[] } } });
        _mapaCliente.addLayer({ id:'ra-proxima-layer', type:'line', source:'ra-proxima',
            layout:{ 'line-join':'round', 'line-cap':'round' },
            paint:{ 'line-color':'#3498db', 'line-width':4, 'line-opacity':0.95 }
        });
    }
}

// ── Iniciar / parar rastreamento ─────────────────────────────────────────────
function _iniciarRastreamento() {
    _pararRastreamento();
    _buscarPosEntregador();
    _buscarParadasRota();
    atualizarBadgeEntrega();
    _gpsInterval  = setInterval(_buscarPosEntregador, 3000);
    _rotaInterval = setInterval(() => { _buscarParadasRota(); atualizarBadgeEntrega(); }, 15000);
    // Realtime GPS — escuta INSERT e UPDATE (upsert pode gerar INSERT na primeira vez)
    _realtimeGPS = sb.channel('gps_cli_rt')
        .on('postgres_changes', { event:'INSERT', schema:'public', table:'gps', filter:'chave=eq.entregador_gps' },
            payload => {
                try {
                    const pos = JSON.parse(payload.new.valor);
                    if (_offlineTimer) { clearTimeout(_offlineTimer); _offlineTimer = null; }
                    _ultimaVezOnline = Date.now();
                    _setOnline(pos);
                } catch(e) { console.warn('[GPS INSERT] Erro ao parsear posição:', e); }
            })
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'gps', filter:'chave=eq.entregador_gps' },
            payload => {
                try {
                    const pos = JSON.parse(payload.new.valor);
                    if (_offlineTimer) { clearTimeout(_offlineTimer); _offlineTimer = null; }
                    _ultimaVezOnline = Date.now();
                    _setOnline(pos);
                } catch(e) { console.warn('[GPS UPDATE] Erro ao parsear posição:', e); }
            })
        .subscribe((status) => {
            console.log('[Realtime GPS] status:', status);
            if (status === 'SUBSCRIBED') {
                console.log('[Realtime GPS] ✅ Conectado com sucesso');
            } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
                console.warn('[Realtime GPS] ⚠️ Falhou, dependendo do polling a cada 3s');
            }
        });
    // Realtime Rotas — atualiza marcadores quando entregador marca como entregue
    _realtimeRotas = sb.channel('rotas_cli_rt')
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'rotas' },
            () => { _buscarParadasRota(); atualizarBadgeEntrega(); })
        .subscribe();
    // Realtime Pedidos — atualiza badge quando entregador confirma entrega
    _realtimePedidos = sb.channel('pedidos_cli_rt')
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'pedidos',
            filter:`customer_phone=eq.${user?.phone}` },
            () => { atualizarBadgeEntrega(); _buscarParadasRota(); })
        .subscribe();
    // Realtime Rota Aleatória — fila mudou (novo cliente, saiu, entregou)
    _realtimeRA = sb.channel('ra_cli_rt')
        .on('postgres_changes', { event:'*', schema:'public', table:'gps',
            filter:`chave=eq.${RA_CHAVE}` },
            () => _desenharRotaAleatoria())
        .subscribe();
    // Polling RA como backup (10s)
    _raInterval = setInterval(_desenharRotaAleatoria, 10000);
    // Carregar imediatamente
    _desenharRotaAleatoria();
}
function _pararRastreamento() {
    if (_gpsInterval)    { clearInterval(_gpsInterval);    _gpsInterval  = null; }
    if (_rotaInterval)   { clearInterval(_rotaInterval);   _rotaInterval = null; }
    if (_raInterval)     { clearInterval(_raInterval);     _raInterval   = null; }
    if (_realtimeGPS)     { sb.removeChannel(_realtimeGPS);     _realtimeGPS     = null; }
    if (_realtimeRotas)   { sb.removeChannel(_realtimeRotas);   _realtimeRotas   = null; }
    if (_realtimePedidos) { sb.removeChannel(_realtimePedidos); _realtimePedidos = null; }
    if (_realtimeRA)      { sb.removeChannel(_realtimeRA);      _realtimeRA      = null; }
    _limparMarcadoresRA();
    _setGeoJSON('ra-completa', null);
    _setGeoJSON('ra-proxima', null);
}

// ── Status inicial do card (sem abrir modal) ─────────────────────────────────
async function verificarStatusEntregadorCard() {
    try {
        const { data } = await sb.from('gps').select('valor').eq('chave','entregador_gps').maybeSingle();
        if (!data?.valor || data.valor === '{}') { _setOffline(); return; }
        let pos; try { pos = JSON.parse(data.valor); } catch(e) { _setOffline(); return; }
        if (!pos?.lat) { _setOffline(); return; }
        const diffMinCard = pos.ts ? (Date.now() - new Date(pos.ts).getTime()) / 60000 : 999;
        const cardDot = document.getElementById('entregadorOnlineDot');
        const txt     = document.getElementById('entregadorStatusText');
        if (diffMinCard > 5) {
            if (cardDot) cardDot.style.background = '#e74c3c';
            if (txt) txt.textContent = 'Offline 🔴';
        } else if (diffMinCard >= 1) {
            if (cardDot) cardDot.style.background = '#f39c12';
            if (txt) txt.textContent = 'Sinal fraco 🟠';
        } else {
            if (cardDot) cardDot.style.background = '#2ecc71';
            if (txt) txt.textContent = 'Ao vivo 🟢';
        }
    } catch(e) {}
}




// ── Calcular posição na fila e ETA para o cliente logado ────────────────────
async function atualizarBadgeEntrega() {
    if (!user?.phone) return;
    try {
        // Verificar se o pedido já foi entregue hoje
        const janela = _janelaPedido();
        const { data: pedidoHoje } = await sb.from('pedidos')
            .select('entregue, entregue_em')
            .eq('customer_phone', user.phone)
            .gte('created_at', janela.inicio)
            .lt('created_at', janela.fim)
            .order('created_at', { ascending: false })
            .limit(1).maybeSingle();

        if (pedidoHoje?.entregue) {
            const badge = document.getElementById('entregaBadge');
            const numEl = document.getElementById('badgeFilaNum');
            const etaEl = document.getElementById('badgeEta');
            if (badge) badge.style.display = 'flex';
            if (numEl) { numEl.textContent = '✅'; numEl.style.color = '#27ae60'; }
            if (etaEl) etaEl.textContent = 'Entregue!';
            return;
        }

        // Buscar todas as rotas ativas ou criadas para hoje
        const hoje = (() => { const p = _partesSP(new Date()); return `${p.year}-${p.month}-${p.day}`; })();
        const { data: rotas } = await sb.from('rotas')
            .select('id,status,paradas,paradas_template,nome')
            .in('status', ['criada','em_andamento'])
            .order('hora_saida', { ascending: true });

        if (!rotas?.length) { _esconderBadge(); return; }

        let minhaRota = null;
        let posNaFila = 0;        // clientes na frente (de todas as rotas antes)
        let encontrado = false;
        let nomeRota = '';

        for (const rota of rotas) {
            const paradas = rota.paradas || rota.paradas_template || [];
            const pendentes = paradas.filter(p => p.status !== 'entregue');

            for (let i = 0; i < pendentes.length; i++) {
                if (pendentes[i].cliente_phone === user.phone) {
                    minhaRota = rota;
                    nomeRota  = rota.nome || rota.Rotas || 'Rota';
                    posNaFila += i; // quantos na frente dentro dessa rota
                    encontrado = true;
                    break;
                }
            }
            if (encontrado) break;
            // Se não estava nessa rota, soma todos os pendentes dela (são "antes de mim")
            if (!encontrado) posNaFila += pendentes.length;
        }

        if (!encontrado) { _esconderBadge(); return; }

        // Calcular ETA estimado: ~12 min por parada
        const MIN_POR_PARADA = 12;
        const etaMin = posNaFila === 0 ? 'Próximo!' : (posNaFila * MIN_POR_PARADA) + '-' + (posNaFila * MIN_POR_PARADA + MIN_POR_PARADA) + 'min';
        const filaTexto = posNaFila === 0 ? '🎯 Próximo!' : posNaFila + ' na frente';

        // Atualizar badge
        const badge    = document.getElementById('entregaBadge');
        const numEl    = document.getElementById('badgeFilaNum');
        const etaEl    = document.getElementById('badgeEta');
        if (badge)  { badge.style.display = 'flex'; }
        if (numEl)  numEl.textContent  = posNaFila === 0 ? '🎯' : posNaFila + 'x';
        if (etaEl)  etaEl.textContent  = posNaFila === 0 ? 'Próximo!' : '~' + etaMin;

        // Atualizar situação dentro do modal
        const sitEl = document.getElementById('mapaSituacao');
        if (sitEl) sitEl.textContent = filaTexto + ' · ' + nomeRota;

    } catch(e) { console.warn('Badge entrega:', e); }
}

function _esconderBadge() {
    const badge = document.getElementById('entregaBadge');
    if (badge) badge.style.display = 'none';
}


// ── Painel ⚠️ de informações da rota ─────────────────────────────────────────
let _painelAberto = false;
function togglePainelRota() {
    const painel = document.getElementById('painelRota');
    if (!painel) return;
    _painelAberto = !_painelAberto;
    painel.style.display = _painelAberto ? 'block' : 'none';
    if (_painelAberto) _renderPainelRota();
}

async function _renderPainelRota() {
    const conteudo = document.getElementById('painelRotaConteudo');
    if (!conteudo) return;
    conteudo.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:8px 0;">Carregando...</div>';

    try {
        // Usa a mesma janela de pedido (regra das 14h) para validar se o cliente fez pedido
        const janela = _janelaPedido();
        const [{ data: rotas }, { data: pedidosJanela }] = await Promise.all([
            sb.from('rotas')
                .select('id,status,paradas,paradas_template,nome,hora_saida')
                .in('status', ['criada','em_andamento'])
                .order('hora_saida', { ascending: true }),
            sb.from('pedidos')
                .select('customer_phone')
                .gte('created_at', janela.inicio)
                .lt('created_at', janela.fim)
        ]);
        const phonesComPedidoValido = new Set((pedidosJanela || []).map(p => p.customer_phone).filter(Boolean));

        if (!rotas?.length) {
            conteudo.innerHTML = '<div style="text-align:center;padding:10px 0;"><div style="font-size:28px;margin-bottom:6px;">😴</div><div style="color:#aaa;font-size:13px;">Nenhuma rota ativa no momento.</div></div>';
            return;
        }

        let minhaRota = null, posNaFila = 0, encontrado = false, nomeRota = '', totalPendentes = 0, minhasParadas = null;

        for (const rota of rotas) {
            const paradas = rota.paradas || rota.paradas_template || [];
            // Só conta como pendente quem fez pedido na janela correta e não foi entregue
            const pendentes = paradas.filter(p => p.status !== 'entregue' && phonesComPedidoValido.has(p.cliente_phone));

            for (let i = 0; i < pendentes.length; i++) {
                if (pendentes[i].cliente_phone === user?.phone) {
                    minhaRota  = rota;
                    nomeRota   = rota.nome || 'Rota';
                    posNaFila  = i;
                    encontrado = true;
                    minhasParadas = pendentes;
                    totalPendentes = pendentes.length;
                    break;
                }
            }
            if (encontrado) break;
            posNaFila += pendentes.length;
        }

        if (!encontrado) {
            // Usuário não está em nenhuma rota ativa
            conteudo.innerHTML = '<div style="text-align:center;padding:10px 0;"><div style="font-size:28px;margin-bottom:6px;">📭</div><div style="color:#aaa;font-size:13px;">Seu pedido não está em nenhuma rota ativa.</div></div>';
            return;
        }

        const MIN_POR_PARADA = 12;
        const etaMin  = posNaFila * MIN_POR_PARADA;
        const etaMax  = etaMin + MIN_POR_PARADA;
        const isProx  = posNaFila === 0;

        // Cor do status
        const statusCor   = minhaRota.status === 'em_andamento' ? '#27ae60' : '#f39c12';
        const statusLabel = minhaRota.status === 'em_andamento' ? '🚀 Em andamento' : '🕐 Aguardando saída';

        conteudo.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:10px;">

            <!-- Status da rota -->
            <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8f8f6;border-radius:12px;">
              <span style="font-size:13px;font-weight:700;color:${statusCor};">${statusLabel}</span>
              <span style="font-size:11px;color:#aaa;margin-left:auto;">${nomeRota}</span>
            </div>

            <!-- Fila -->
            <div style="display:flex;gap:8px;">
              <div style="flex:1;background:${isProx ? 'rgba(46,204,113,0.1)' : 'rgba(52,152,219,0.1)'};border:1.5px solid ${isProx ? 'rgba(46,204,113,0.4)' : 'rgba(52,152,219,0.3)'};border-radius:14px;padding:12px 10px;text-align:center;">
                <div style="font-size:26px;font-weight:900;color:${isProx ? '#27ae60' : '#2980b9'};">${isProx ? '🎯' : posNaFila}</div>
                <div style="font-size:11px;color:#666;font-weight:600;margin-top:2px;">${isProx ? 'Você é o próximo!' : 'na sua frente'}</div>
              </div>
              <div style="flex:1;background:rgba(241,196,15,0.1);border:1.5px solid rgba(241,196,15,0.4);border-radius:14px;padding:12px 10px;text-align:center;">
                <div style="font-size:18px;font-weight:900;color:#d4a017;">${isProx ? 'Em breve!' : '~' + etaMin + '-' + etaMax + 'min'}</div>
                <div style="font-size:11px;color:#666;font-weight:600;margin-top:2px;">tempo estimado</div>
              </div>
            </div>

            <!-- Total da rota -->
            <div style="padding:8px 12px;background:#f8f8f6;border-radius:12px;display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:12px;color:#888;">Paradas restantes na rota</span>
              <span style="font-size:13px;font-weight:800;color:#333;">${totalPendentes} 📍</span>
            </div>

            <!-- Nota -->
            <div style="font-size:11px;color:#bbb;text-align:center;">Estimativa baseada em ~12 min por parada</div>
          </div>
        `;
    } catch(e) {
        conteudo.innerHTML = '<div style="color:#e74c3c;font-size:13px;text-align:center;padding:8px 0;">Erro ao carregar informações.</div>';
    }
}

    if (document.getElementById('modalLocalizacao')?.style.transform === 'translateY(0px)') fecharLocalizacao();

window.addEventListener('load', () => setTimeout(verificarStatusEntregadorCard, 3000));

// Auto-iniciar ao carregar
window.addEventListener('load', () => {

    setTimeout(() => {
        _iniciarMapa();
    }, 200);
});

// Back button fecha e volta
window.addEventListener('popstate', () => {

});
